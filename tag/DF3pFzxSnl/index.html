<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'false'
  if (newWindow === 'true') {
    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })
  }
  // 代码高亮
  hljs.initHighlightingOnLoad();

</script>

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;p&gt;1、精简系统前提是安装好原版的Windows系统，在安装中：&lt;br&gt;
Win11：安装到设置语言，随后选择键盘布局；&lt;br&gt;
按 Shift+F10 打开命令提示符；&lt;br&gt;
输入oobe\bypassnro，按 Enter，然后等待计算机重新启动（如使用Ventoy，则不需要此步骤）；&lt;br&gt;
继续安装，但：不连接到internet，拒绝隐私部分中的每个选项。&lt;br&gt;
Win10：完成设置，但请确保：&lt;br&gt;
当提示连接到internet时，单击“我没有internet”；&lt;br&gt;
点击“internet”页面后继续有限设置或域加入；&lt;br&gt;
拒绝隐私部分中的每个选项；&lt;br&gt;
拒绝Cortana。&lt;/p&gt;
&lt;p&gt;2、安装好硬件驱动并更新Windows系统，直到没有更多更新可用，这是为了确保Windows不会在运行Playbook后尝试安装更新，或者以其他方式干扰改进过程；&lt;/p&gt;
&lt;p&gt;3、下载AME Wizard程序安装，运行AME Wizard Beta.exe。&lt;br&gt;
AME向导是一个修改Windows的终极工具。AtlasOS和ReviOS两个精简系统都是通过在AME里运行Playbook来达成Windows系统的优化。&lt;br&gt;
AME主页：&lt;br&gt;
https://ameliorated.io/&lt;br&gt;
AME也有精简臃肿Win10和Win11的脚本，官方下载版本：&lt;br&gt;
Win11：https://download.ameliorated.io/AME%2011%20Beta.apbx&lt;br&gt;
Win10：https://download.ameliorated.io/AME%2010%20Beta.apbx&lt;br&gt;
&lt;img src=&#34;https://bobvane.github.io/post-images/1740109822229.png&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;p&gt;4、在atlasos.net网站上，单击“Get  Started Now”，然后单击-&amp;gt; I&#39;m following the guide,show me the downloads。的点击“Atlas Playbook”下载AtlasOS脚本并解压。&lt;/p&gt;
&lt;p&gt;5、如果选择了手动安装驱动程序，请从结业的Atlas Playbook脚本中运行Disable Drivers Installation in Windows Update.reg并重新启动。&lt;/p&gt;
&lt;p&gt;6、从AME  Wizard文件夹中运行AME Wizard Beta.exe，如果SmartScreen发出警告，指出AME Wizard是无法识别的应用程序，请单击“更多信息”绕过此警告，然后仍然运行。单击顶部的更新，并确保AME Wizard是最新版本。&lt;/p&gt;
&lt;p&gt;7、将 Atlas Playbook.apbx 从Atlas Playbook文件夹拖到AME Wizard中。&lt;/p&gt;
&lt;p&gt;8、按照AME Wizard的屏幕说明安装Atlas Playbook。&lt;/p&gt;

          &lt;p&gt;项目地址：https://github.com/laurent22/joplin/&lt;/p&gt;
&lt;p&gt;Joplin是一个免费的开源笔记和待办事项应用程序，它可以处理大量组织成笔记本的笔记。笔记是可搜索的，可以直接从应用程序或您自己的文本编辑器复制，标记和修改。注释采用Markdown格式。&lt;br&gt;
从Evernote导出的笔记可以导入到Joplin中，包括格式化的内容 (转换为Markdown)，资源 (图像，附件等)和完整的元数据 (地理位置，更新时间，创建时间等)。也可以导入纯Markdown文件。&lt;br&gt;
Joplin是 “离线优先”，这意味着您始终将所有数据保存在手机或计算机上。这样可以确保您的笔记始终可以访问，无论您是否有互联网连接。&lt;br&gt;
可以使用端到端加密与各种云服务 (包括Nextcloud，Dropbox，OneDrive和Joplin cloud) 安全地同步笔记。&lt;br&gt;
全文搜索可在所有平台上快速找到您需要的信息。该应用程序可以使用插件和主题进行自定义，您也可以轻松创建自己的应用程序。&lt;br&gt;
该应用程序可用于Windows，Linux，macOS，Android和iOS。用于保存浏览器中的网页和屏幕截图的Web裁剪器也可用于Firefox和Chrome。&lt;/p&gt;

&lt;p&gt;功能特性：&lt;/p&gt;

&lt;p&gt;双击直接编辑远程文件.&lt;/p&gt;
&lt;p&gt;支持密码或者密匙登录.&lt;/p&gt;
&lt;p&gt;支持Zmodem(rz, sz).&lt;/p&gt;
&lt;p&gt;支持ssh隧道&lt;/p&gt;

&lt;p&gt;支持透明窗口(Mac, win).&lt;/p&gt;
&lt;p&gt;支持设置终端背景图片.&lt;/p&gt;
&lt;p&gt;支持代理服务器.&lt;/p&gt;
&lt;p&gt;支持预设快捷命令&lt;/p&gt;
&lt;p&gt;支持主题&lt;/p&gt;
&lt;p&gt;支持同步书签等数据到github/gitee私人gist&lt;/p&gt;
&lt;p&gt;支持快速输入命令到一个或者多个终端&lt;/p&gt;
&lt;p&gt;支持命令行使用&lt;/p&gt;
&lt;p&gt;深度链接支持&lt;/p&gt;

,{&#34;content&#34;:&#34;&lt;p&gt;推荐几个折腾常用的检查IP各种属性的网站，超级实用！可以全面分析ip的各种情况，检测住宅ip、检查ip的延迟、检查ip的路由信息、检查ip的伪装、检查ip的风险值等&lt;/p&gt;\n&lt;p&gt;1、检测IP伪装网站WHOER：【&lt;a href=\&#34;https://whoer.net/zh\&#34; target=\&#34;_blank\&#34;&gt;点击进入&lt;/a&gt;】&lt;/p&gt;\n&lt;p&gt;2、检测IP地址类型：【&lt;a href=\&#34;https://ipinfo.io/\&#34; target=\&#34;_blank\&#34;&gt;点击进入&lt;/a&gt;】&lt;/p&gt;\n&lt;p&gt;3、检查IP欺诈值：【&lt;a href=\&#34;https://scamalytics.com/\&#34; target=\&#34;_blank\&#34;&gt;点击进入&lt;/a&gt;】&lt;/p&gt;\n&lt;p&gt;4、检查IP的路由信息：【&lt;a href=\&#34;https://tools.ipip.net/traceroute.php\&#34; target=\&#34;_blank\&#34;&gt;点击进入&lt;/a&gt;】&lt;/p&gt;\n&lt;p&gt;5、检查IP地址的延迟：【&lt;a href=\&#34;https://tools.ipip.net/ping.php\&#34; target=\&#34;_blank\&#34;&gt;点击进入&lt;/a&gt;】&lt;/p&gt;\n&lt;p&gt;6、网络空间搜索引擎：【&lt;a href=\&#34;https://fofa.info/\&#34; target=\&#34;_blank\&#34;&gt;点击进入&lt;/a&gt;】&lt;/p&gt;\n&lt;p&gt;7、常用测速网站：【&lt;a href=\&#34;https://www.speedtest.net/\&#34; target=\&#34;_blank\&#34;&gt;点击进入&lt;/a&gt;】&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;jian-cha-ip-ge-chong-shu-xing-de-wang-zhan&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;检查IP各种属性的网站&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;VPS&#34;,&#34;slug&#34;:&#34;DF3pFzxSnl&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/DF3pFzxSnl/&#34;}],&#34;date&#34;:&#34;2025-02-24 11:03:43&#34;,&#34;dateFormat&#34;:&#34;2025-02-24&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://bobvane.github.io/post/jian-cha-ip-ge-chong-shu-xing-de-wang-zhan/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:33000,&#34;words&#34;:153,&#34;minutes&#34;:1},&#34;description&#34;:&#34;推荐几个折腾常用的检查IP各种属性的网站，超级实用！可以全面分析ip的各种情况，检测住宅ip、检查ip的延迟、检查ip的路由信息、检查ip的伪装、检查ip的风险值等\n1、检测IP伪装网站WHOER：【点击进入】\n2、检测IP地址类型：【点击...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;项目介绍：&lt;br&gt;\nPeaNUT 是一个轻量级的网络不间断电源（UPS）监控工具，专为那些希望简便管理其UPS状态的用户设计。它通过Network UPS Tools（NUT）提供信息，显示关于UPS设备的关键数据，并允许在必要时进行交互。此项目采用Apache-2.0许可证发布，支持通过Docker轻松部署或从源代码编译安装。&lt;br&gt;\n项目地址：&lt;br&gt;\nhttps://github.com/Brandawg93/PeaNUT&lt;/p&gt;\n&lt;p&gt;项目快速启动&lt;br&gt;\n使用Docker部署&lt;br&gt;\n要快速启动PeaNUT，您可以利用Docker。只需执行以下命令：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;docker run -v ${PWD}/config:/config -p 8080:8080 --restart unless-stopped \\\n--env WEB_PORT=8080 brandawg93/peanut\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;或者使用docker-compose.yml配置文件来实现容器化部署：&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;services:\n  peanut:\n    image: brandawg93/peanut:latest\n    container_name: PeaNUT\n    restart: unless-stopped\n    volumes:\n      - /path/to/config:/config\n    ports:\n      - 8080:8080\n    environment:\n      - WEB_PORT=8080\n&lt;/code&gt;&lt;/pre&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://bobvane.github.io/post-images/1740120694981.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&#34;,&#34;fileName&#34;:&#34;peanutwang-luo-bu-jian-duan-dian-yuan-upsde-wei-xing-yi-biao-ban&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;PeaNUT：网络不间断电源（UPS）的微型仪表板&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Docker&#34;,&#34;slug&#34;:&#34;F1z_Ije2px&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/F1z_Ije2px/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Nas&#34;,&#34;slug&#34;:&#34;lksV0QZsx8&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/lksV0QZsx8/&#34;}],&#34;date&#34;:&#34;2025-02-21 14:41:19&#34;,&#34;dateFormat&#34;:&#34;2025-02-21&#34;,&#34;feature&#34;:&#34;https://bobvane.github.io/post-images/peanutwang-luo-bu-jian-duan-dian-yuan-upsde-wei-xing-yi-biao-ban.svg&#34;,&#34;link&#34;:&#34;https://bobvane.github.io/post/peanutwang-luo-bu-jian-duan-dian-yuan-upsde-wei-xing-yi-biao-ban/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:52000,&#34;words&#34;:206,&#34;minutes&#34;:1},&#34;description&#34;:&#34;项目介绍：\nPeaNUT 是一个轻量级的网络不间断电源（UPS）监控工具，专为那些希望简便管理其UPS状态的用户设计。它通过Network UPS Tools（NUT）提供信息，显示关于UPS设备的关键数据，并允许在必要时进行交互。此项目采...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;对 Windows 的修改，专为爱好者设计。&lt;br&gt;\n是时候体验全新的 Windows 了。Atlas 专为发烧友和游戏玩家设计，可提高隐私性、可用性和性能。&lt;br&gt;\n项目地址：&lt;br&gt;\nhttps://atlasos.net/&lt;br&gt;\nhttps://github.com/Atlas-OS/Atlas&lt;/p&gt;\n&lt;p&gt;1、精简系统前提是安装好原版的Windows系统，在安装中：&lt;br&gt;\nWin11：安装到设置语言，随后选择键盘布局；&lt;br&gt;\n按 Shift+F10 打开命令提示符；&lt;br&gt;\n输入oobe\\bypassnro，按 Enter，然后等待计算机重新启动（如使用Ventoy，则不需要此步骤）；&lt;br&gt;\n继续安装，但：不连接到internet，拒绝隐私部分中的每个选项。&lt;br&gt;\nWin10：完成设置，但请确保：&lt;br&gt;\n当提示连接到internet时，单击“我没有internet”；&lt;br&gt;\n点击“internet”页面后继续有限设置或域加入；&lt;br&gt;\n拒绝隐私部分中的每个选项；&lt;br&gt;\n拒绝Cortana。&lt;/p&gt;\n&lt;p&gt;2、安装好硬件驱动并更新Windows系统，直到没有更多更新可用，这是为了确保Windows不会在运行Playbook后尝试安装更新，或者以其他方式干扰改进过程；&lt;/p&gt;\n&lt;p&gt;3、下载AME Wizard程序安装，运行AME Wizard Beta.exe。&lt;br&gt;\nAME向导是一个修改Windows的终极工具。AtlasOS和ReviOS两个精简系统都是通过在AME里运行Playbook来达成Windows系统的优化。&lt;br&gt;\nAME主页：&lt;br&gt;\nhttps://ameliorated.io/&lt;br&gt;\nAME也有精简臃肿Win10和Win11的脚本，官方下载版本：&lt;br&gt;\nWin11：https://download.ameliorated.io/AME%2011%20Beta.apbx&lt;br&gt;\nWin10：https://download.ameliorated.io/AME%2010%20Beta.apbx&lt;br&gt;\n&lt;img src=\&#34;https://bobvane.github.io/post-images/1740109822229.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;4、在atlasos.net网站上，单击“Get  Started Now”，然后单击-&amp;gt; I&#39;m following the guide,show me the downloads。的点击“Atlas Playbook”下载AtlasOS脚本并解压。&lt;/p&gt;\n&lt;p&gt;5、如果选择了手动安装驱动程序，请从结业的Atlas Playbook脚本中运行Disable Drivers Installation in Windows Update.reg并重新启动。&lt;/p&gt;\n&lt;p&gt;6、从AME  Wizard文件夹中运行AME Wizard Beta.exe，如果SmartScreen发出警告，指出AME Wizard是无法识别的应用程序，请单击“更多信息”绕过此警告，然后仍然运行。单击顶部的更新，并确保AME Wizard是最新版本。&lt;/p&gt;\n&lt;p&gt;7、将 Atlas Playbook.apbx 从Atlas Playbook文件夹拖到AME Wizard中。&lt;/p&gt;\n&lt;p&gt;8、按照AME Wizard的屏幕说明安装Atlas Playbook。&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;p&gt;精简系统脚本之间的一些关键区别。&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;&lt;/th&gt;\n&lt;th&gt;AME 10/11&lt;/th&gt;\n&lt;th&gt;AtlasOS&lt;/th&gt;\n&lt;th&gt;ReviOS&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;由改进版创建&lt;/td&gt;\n&lt;td&gt;是&lt;/td&gt;\n&lt;td&gt;否&lt;/td&gt;\n&lt;td&gt;否&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;目标受众&lt;/td&gt;\n&lt;td&gt;高级用户，创意人，游戏玩家&lt;/td&gt;\n&lt;td&gt;游戏玩家，低端系统用户&lt;/td&gt;\n&lt;td&gt;游戏玩家，高级用户&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;主要重点&lt;/td&gt;\n&lt;td&gt;隐私，Windows UI，可用性&lt;/td&gt;\n&lt;td&gt;性能，隐私&lt;/td&gt;\n&lt;td&gt;性能，隐私，可用性&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&#34;,&#34;fileName&#34;:&#34;windows-jing-jian-xi-tong-atlasos&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;对 Windows 的修改，专为爱好者设计。&lt;br&gt;\n是时候体验全新的 Windows 了。Atlas 专为发烧友和游戏玩家设计，可提高隐私性、可用性和性能。&lt;br&gt;\n项目地址：&lt;br&gt;\nhttps://atlasos.net/&lt;br&gt;\nhttps://github.com/Atlas-OS/Atlas&lt;/p&gt;\n&lt;p&gt;1、精简系统前提是安装好原版的Windows系统，在安装中：&lt;br&gt;\nWin11：安装到设置语言，随后选择键盘布局；&lt;br&gt;\n按 Shift+F10 打开命令提示符；&lt;br&gt;\n输入oobe\\bypassnro，按 Enter，然后等待计算机重新启动（如使用Ventoy，则不需要此步骤）；&lt;br&gt;\n继续安装，但：不连接到internet，拒绝隐私部分中的每个选项。&lt;br&gt;\nWin10：完成设置，但请确保：&lt;br&gt;\n当提示连接到internet时，单击“我没有internet”；&lt;br&gt;\n点击“internet”页面后继续有限设置或域加入；&lt;br&gt;\n拒绝隐私部分中的每个选项；&lt;br&gt;\n拒绝Cortana。&lt;/p&gt;\n&lt;p&gt;2、安装好硬件驱动并更新Windows系统，直到没有更多更新可用，这是为了确保Windows不会在运行Playbook后尝试安装更新，或者以其他方式干扰改进过程；&lt;/p&gt;\n&lt;p&gt;3、下载AME Wizard程序安装，运行AME Wizard Beta.exe。&lt;br&gt;\nAME向导是一个修改Windows的终极工具。AtlasOS和ReviOS两个精简系统都是通过在AME里运行Playbook来达成Windows系统的优化。&lt;br&gt;\nAME主页：&lt;br&gt;\nhttps://ameliorated.io/&lt;br&gt;\nAME也有精简臃肿Win10和Win11的脚本，官方下载版本：&lt;br&gt;\nWin11：https://download.ameliorated.io/AME%2011%20Beta.apbx&lt;br&gt;\nWin10：https://download.ameliorated.io/AME%2010%20Beta.apbx&lt;br&gt;\n&lt;img src=\&#34;https://bobvane.github.io/post-images/1740109822229.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;4、在atlasos.net网站上，单击“Get  Started Now”，然后单击-&amp;gt; I&#39;m following the guide,show me the downloads。的点击“Atlas Playbook”下载AtlasOS脚本并解压。&lt;/p&gt;\n&lt;p&gt;5、如果选择了手动安装驱动程序，请从结业的Atlas Playbook脚本中运行Disable Drivers Installation in Windows Update.reg并重新启动。&lt;/p&gt;\n&lt;p&gt;6、从AME  Wizard文件夹中运行AME Wizard Beta.exe，如果SmartScreen发出警告，指出AME Wizard是无法识别的应用程序，请单击“更多信息”绕过此警告，然后仍然运行。单击顶部的更新，并确保AME Wizard是最新版本。&lt;/p&gt;\n&lt;p&gt;7、将 Atlas Playbook.apbx 从Atlas Playbook文件夹拖到AME Wizard中。&lt;/p&gt;\n&lt;p&gt;8、按照AME Wizard的屏幕说明安装Atlas Playbook。&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;Windows精简系统AtlasOS&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2025-02-21 13:06:33&#34;,&#34;dateFormat&#34;:&#34;2025-02-21&#34;,&#34;feature&#34;:&#34;https://bobvane.github.io/post-images/windows-jing-jian-xi-tong-atlasos.webp&#34;,&#34;link&#34;:&#34;https://bobvane.github.io/post/windows-jing-jian-xi-tong-atlasos/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:true,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:144000,&#34;words&#34;:617,&#34;minutes&#34;:3},&#34;description&#34;:&#34;对 Windows 的修改，专为爱好者设计。\n是时候体验全新的 Windows 了。Atlas 专为发烧友和游戏玩家设计，可提高隐私性、可用性和性能。\n项目地址：\nhttps://atlasos.net/\nhttps://github.co...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;ReviOS是Windows的定制版本，设计轻巧，稳定，和专注于提高性能，隐私和兼容性。它渴望重新创建Windows作为操作系统应该是什么-容易和简单。现在与AME向导兼容。&lt;/p&gt;\n&lt;p&gt;项目地址：&lt;br&gt;\nhttps://www.revi.cc/&lt;br&gt;\nhttps://github.com/meetrevision/playbook&lt;/p&gt;\n&lt;p&gt;1、精简系统前提是安装好原版的Windows系统后并更新Windows系统完毕，这是为了确保Windows不会在运行Playbook后尝试安装更新，或者以其他方式干扰改进过程。；&lt;/p&gt;\n&lt;p&gt;2、下载AME Wizard程序安装，运行AME Wizard Beta.exe。&lt;br&gt;\nAME向导是一个修改Windows的终极工具。AtlasOS和ReviOS两个精简系统都是通过在AME里运行Playbook来达成Windows系统的优化。&lt;br&gt;\nAME主页：&lt;br&gt;\nhttps://ameliorated.io/&lt;br&gt;\nAME也有精简臃肿Win10和Win11的脚本，官方下载版本：&lt;br&gt;\nWin11：https://download.ameliorated.io/AME%2011%20Beta.apbx&lt;br&gt;\nWin10：https://download.ameliorated.io/AME%2010%20Beta.apbx&lt;br&gt;\n&lt;img src=\&#34;https://bobvane.github.io/post-images/1740109822229.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;3、然后下载好ReviOS的.apbx结尾文件，比如：Revi-PB-24.12.apbx。然后将ReviOS的Playbook文件也就是.apbx文件拖放到AME Wizard软件界面左边的Playbooks列。加载后，根据需要按照屏幕上的所有说明进行操作，然后单击“下一步”继续。在下一页上，AME向导将检查您的系统是否满足必要的要求。根据需要按照屏幕上的说明准备系统。满足所有要求后，导航至下一页，并阅读许可协议。选择“下一步”&amp;gt;“同意”，您将进入最后一页。在这里，您可以选择您选择的功能，或者单击下一步继续使用默认配置。一旦开始ReviOS脚本的设置，脚本将开始修改Windows。只需等待它完成，在重新启动后拥有ReviOS精简的Windows系统。&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;p&gt;精简系统脚本之间的一些关键区别。&lt;/p&gt;\n&lt;table&gt;\n&lt;thead&gt;\n&lt;tr&gt;\n&lt;th&gt;&lt;/th&gt;\n&lt;th&gt;AME 10/11&lt;/th&gt;\n&lt;th&gt;AtlasOS&lt;/th&gt;\n&lt;th&gt;ReviOS&lt;/th&gt;\n&lt;/tr&gt;\n&lt;/thead&gt;\n&lt;tbody&gt;\n&lt;tr&gt;\n&lt;td&gt;由改进版创建&lt;/td&gt;\n&lt;td&gt;是&lt;/td&gt;\n&lt;td&gt;否&lt;/td&gt;\n&lt;td&gt;否&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;目标受众&lt;/td&gt;\n&lt;td&gt;高级用户，创意人，游戏玩家&lt;/td&gt;\n&lt;td&gt;游戏玩家，低端系统用户&lt;/td&gt;\n&lt;td&gt;游戏玩家，高级用户&lt;/td&gt;\n&lt;/tr&gt;\n&lt;tr&gt;\n&lt;td&gt;主要重点&lt;/td&gt;\n&lt;td&gt;隐私，Windows UI，可用性&lt;/td&gt;\n&lt;td&gt;性能，隐私&lt;/td&gt;\n&lt;td&gt;性能，隐私，可用性&lt;/td&gt;\n&lt;/tr&gt;\n&lt;/tbody&gt;\n&lt;/table&gt;\n&#34;,&#34;fileName&#34;:&#34;jing-jian-xi-tong-revios&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;ReviOS是Windows的定制版本，设计轻巧，稳定，和专注于提高性能，隐私和兼容性。它渴望重新创建Windows作为操作系统应该是什么-容易和简单。现在与AME向导兼容。&lt;/p&gt;\n&lt;p&gt;项目地址：&lt;br&gt;\nhttps://www.revi.cc/&lt;br&gt;\nhttps://github.com/meetrevision/playbook&lt;/p&gt;\n&lt;p&gt;1、精简系统前提是安装好原版的Windows系统后并更新Windows系统完毕，这是为了确保Windows不会在运行Playbook后尝试安装更新，或者以其他方式干扰改进过程。；&lt;/p&gt;\n&lt;p&gt;2、下载AME Wizard程序安装，运行AME Wizard Beta.exe。&lt;br&gt;\nAME向导是一个修改Windows的终极工具。AtlasOS和ReviOS两个精简系统都是通过在AME里运行Playbook来达成Windows系统的优化。&lt;br&gt;\nAME主页：&lt;br&gt;\nhttps://ameliorated.io/&lt;br&gt;\nAME也有精简臃肿Win10和Win11的脚本，官方下载版本：&lt;br&gt;\nWin11：https://download.ameliorated.io/AME%2011%20Beta.apbx&lt;br&gt;\nWin10：https://download.ameliorated.io/AME%2010%20Beta.apbx&lt;br&gt;\n&lt;img src=\&#34;https://bobvane.github.io/post-images/1740109822229.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/p&gt;\n&lt;p&gt;3、然后下载好ReviOS的.apbx结尾文件，比如：Revi-PB-24.12.apbx。然后将ReviOS的Playbook文件也就是.apbx文件拖放到AME Wizard软件界面左边的Playbooks列。加载后，根据需要按照屏幕上的所有说明进行操作，然后单击“下一步”继续。在下一页上，AME向导将检查您的系统是否满足必要的要求。根据需要按照屏幕上的说明准备系统。满足所有要求后，导航至下一页，并阅读许可协议。选择“下一步”&amp;gt;“同意”，您将进入最后一页。在这里，您可以选择您选择的功能，或者单击下一步继续使用默认配置。一旦开始ReviOS脚本的设置，脚本将开始修改Windows。只需等待它完成，在重新启动后拥有ReviOS精简的Windows系统。&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;Windows精简系统ReviOS&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2025-02-21 11:24:06&#34;,&#34;dateFormat&#34;:&#34;2025-02-21&#34;,&#34;feature&#34;:&#34;https://bobvane.github.io/post-images/jing-jian-xi-tong-revios.png&#34;,&#34;link&#34;:&#34;https://bobvane.github.io/post/jing-jian-xi-tong-revios/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:true,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:117000,&#34;words&#34;:525,&#34;minutes&#34;:2},&#34;description&#34;:&#34;ReviOS是Windows的定制版本，设计轻巧，稳定，和专注于提高性能，隐私和兼容性。它渴望重新创建Windows作为操作系统应该是什么-容易和简单。现在与AME向导兼容。\n项目地址：\nhttps://www.revi.cc/\nhttps...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;Windows 11 LTSC 2024 安装微软商店项目地址：&lt;br&gt;\n封装 Windows LTSC 版时，默认没有安装微软商店。&lt;br&gt;\n使用wsreset -i确实能恢复微软商店，但是封装提示非所有用户安装导致封装报错。&lt;br&gt;\nhttps://github.com/IceLoveYer/LTSC-Add-MicrosoftStore&lt;br&gt;\n下载压缩包后解压；&lt;br&gt;\n1.确保Bat批处理(.bat文件)、PowerShell脚本(.ps1文件)、程序离线包在同一文件夹内；&lt;br&gt;\n2.双击或右键运行LTSC-Add-MicrosoftStore.bat会罗列匹配到的文件列表，确认后，按任意键继续安装；&lt;br&gt;\n3.顺利的话，你可以在开始菜单找到Microsoft Store应用程序。&lt;/p&gt;\n&lt;p&gt;Add Windows Store for LTSC2021/2024项目地址：&lt;br&gt;\nhttps://github.com/R-YaTian/LTSC-Add-MicrosoftStore-2021_2024&lt;br&gt;\n下载压缩包解压后运行目录中的：&lt;br&gt;\nAdd-Store.cmd&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;ltsc-ban-ben-an-zhuang-wei-ruan-shang-dian-20212024&#34;,&#34;abstr 。&lt;br&gt;\n从Evernote导出的笔记可以导入到Joplin中，包括格式化的内容 (转换为Markdown)，资源 (图像，附件等)和完整的元数据 (地理位置，更新时间，创建时间等)。也可以导入纯Markdown文件。&lt;br&gt;\nJoplin是 “离线优先”，这意味着您始终将所有数据保存在手机或计算机上。这样可以确保您的笔记始终可以访问，无论您是否有互联网连接。&lt;br&gt;\n可以使用端到端加密与各种云服务 (包括Nextcloud，Dropbox，OneDrive和Joplin cloud) 安全地同步笔记。&lt;br&gt;\n全文搜索可在所有平台上快速找到您需要的信息。该应用程序可以使用插件和主题进行自定义，您也可以轻松创建自己的应用程序。&lt;br&gt;\n该应用程序可用于Windows，Linux，macOS，Android和iOS。用于保存浏览器中的网页和屏幕截图的Web裁剪器也可用于Firefox和Chrome。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;joplin-mian-fei-kai-yuan-bi-ji-he-dai-ban-shi-xiang-ying-yong&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;Joplin免费开源笔记和待办事项应用&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;软件&#34;,&#34;slug&#34;:&#34;9hJKMWuI1S&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/9hJKMWuI1S/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Mac&#34;,&#34;slug&#34;:&#34;ZisieWgBfP&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/ZisieWgBfP/&#34;},{&#34;index&#34;:6,&#34;name&#34;:&#34;iOS&#34;,&#34;slug&#34;:&#34;CEchq01RMl&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/CEchq01RMl/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;安卓&#34;,&#34;slug&#34;:&#34;5QHYPYBbxM&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/5QHYPYBbxM/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows&#34;,&#34;slug&#34;:&#34;cs5Mk6sRVA&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/cs5Mk6sRVA/&#34;}],&#34;date&#34;:&#34;2025-02-19 15:02:45&#34;,&#34;dateFormat&#34;:&#34;2025-02-19&#34;,&#34;feature&#34;:&#34;https://bobvane.github.io/post-images/joplin-mian-fei-kai-yuan-bi-ji-he-dai-ban-shi-xiang-ying-yong.png&#34;,&#34;link&#34;:&#34;https://bobvane.github.io/post/joplin-mian-fei-kai-yuan-bi-ji-he-dai-ban-shi-xiang-ying-yong/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:68000,&#34;words&#34;:324,&#34;minutes&#34;:2},&#34;description&#34;:&#34;项目地址：https://github.com/laurent22/joplin/\nJoplin是一个免费的开源笔记和待办事项应用程序，它可以处理大量组织成笔记本的笔记。笔记是可搜索的，可以直接从应用程序或您自己的文本编辑器复制，标记和修改...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;p&gt;https://electerm.html5beta.com/index-zh_cn.html&lt;br&gt;\nhttps://github.com/electerm/electerm&lt;/p&gt;\n&lt;p&gt;github上的开源终端/ssh/telnet/serialport/RDP/VNC/sftp客户端(linux, mac, win)。&lt;/p&gt;\n&lt;p&gt;对于有经验的开发人员，您可以尝试在浏览器 (包括移动设备) 中运行的web应用程序版本: electerm-web&lt;/p&gt;\n&lt;p&gt;Electerm应用的Web版本，可以在浏览器中运行，几乎拥有与桌面版本相同的功能。&lt;/p&gt;\n&lt;p&gt;功能特性：&lt;/p&gt;\n&lt;p&gt;支持ssh,telnet,serialport,RDP,VNC,本地和远程文件管理，sftp文件传输，以及作为本地终端使用&lt;/p&gt;\n&lt;p&gt;全局快捷键切换隐藏显示窗口(类似guake, 默认快捷键ctrl + 2)&lt;/p&gt;\n&lt;p&gt;多平台支持(linux, mac, win)&lt;/p&gt;\n&lt;p&gt;🇺🇸 🇨🇳 🇧🇷 🇷🇺 🇪🇸 🇫🇷 🇹🇷 🇭🇰 🇯🇵 🇸🇦 🇩🇪 🇰🇷 多国语言支持&lt;/p&gt;\n&lt;p&gt;双击直接编辑远程文件.&lt;/p&gt;\n&lt;p&gt;支持密码或者密匙登录.&lt;/p&gt;\n&lt;p&gt;支持Zmodem(rz, sz).&lt;/p&gt;\n&lt;p&gt;支持ssh隧道&lt;/p&gt;\n&lt;p&gt;支持Trzsz(trz/tsz), 类似rz/sz, 兼容tmux.&lt;/p&gt;\n&lt;p&gt;支持透明窗口(Mac, win).&lt;/p&gt;\n&lt;p&gt;支持设置终端背景图片.&lt;/p&gt;\n&lt;p&gt;支持代理服务器.&lt;/p&gt;\n&lt;p&gt;支持预设快捷命令&lt;/p&gt;\n&lt;p&gt;支持主题&lt;/p&gt;\n&lt;p&gt;支持同步书签等数据到github/gitee私人gist&lt;/p&gt;\n&lt;p&gt;支持快速输入命令到一个或者多个终端&lt;/p&gt;\n&lt;p&gt;支持命令行使用&lt;/p&gt;\n&lt;p&gt;深度链接支持&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;kai-yuan-tong-bu-ssh-gong-ju-electermlinux-mac-win&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;开源同步SSH工具Electerm(linux, mac, win)&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;软件&#34;,&#34;slug&#34;:&#34;9hJKMWuI1S&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/9hJKMWuI1S/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Mac&#34;,&#34;slug&#34;:&#34;ZisieWgBfP&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/ZisieWgBfP/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;VPS&#34;,&#34;slug&#34;:&#34;DF3pFzxSnl&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/DF3pFzxSnl/&#34;},{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows&#34;,&#34;slug&#34;:&#34;cs5Mk6sRVA&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/cs5Mk6sRVA/&#34;}],&#34;date&#34;:&#34;2025-02-19 15:01:40&#34;,&#34;dateFormat&#34;:&#34;2025-02-19&#34;,&#34;feature&#34;:&#34;https://bobvane.github.io/post-images/kai-yuan-tong-bu-ssh-gong-ju-electermlinux-mac-win.png&#34;,&#34;link&#34;:&#34;https://bobvane.github.io/post/kai-yuan-tong-bu-ssh-gong-ju-electermlinux-mac-win/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:67000,&#34;words&#34;:293,&#34;minutes&#34;:2},&#34;description&#34;:&#34;https://electerm.html5beta.com/index-zh_cn.html\nhttps://github.com/electerm/electerm\ngithub上的开源终端/ssh/telnet/serialport/...&#34;,&#34;toc&#34;:&#34;&#34;},{&#34;content&#34;:&#34;&lt;h1 id=\&#34;mas-aio\&#34;&gt;MAS AIO&lt;/h1&gt;\n&lt;p&gt;https://github.com/massgravel/Microsoft-Activation-Scripts&lt;br&gt;\n打开 PowerShell（不是 CMD）。要这样做，右键单击 Windows 开始菜单，然后选择 PowerShell 或终端。&lt;br&gt;\n复制并粘贴以下代码，然后按回车键。&lt;br&gt;\nirm https://get.activated.win | iex&lt;br&gt;\n将看到激活选项。选择 [1] HWID进行Windows激活。&lt;br&gt;\n选择 [2] Ohook进行Office激活。&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;ji-huo-wei-ruan-chan-pin-fang-an&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;激活微软产品方案&#34;,&#34;tags&#34;:[{&#34;index&#34;:-1,&#34;name&#34;:&#34;Windows&#34;,&#34;slug&#34;:&#34;cs5Mk6sRVA&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://bobvane.github.io/tag/cs5Mk6sRVA/&#34;}],&#34;date&#34;:&#34;2025-02-19 14:58:57&#34;,&#34;dateFormat&#34;:&#34;2025-02-19&#34;,&#34;feature&#34;:&#34;https://bobvane.github.io/post-images/ji-huo-wei-ruan-chan-pin-fang-an.png&#34;,&#34;link&#34;:&#34;https://bobvane.github.io/post/ji-huo-wei-ruan-chan-pin-fang-an/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:true,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:20000,&#34;words&#34;:
